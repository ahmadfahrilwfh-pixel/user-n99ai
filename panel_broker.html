<style>
  .broker-page-main{display:grid;gap:1rem;padding:1rem;position:relative;z-index:1}
  .broker-form-card{border-radius:var(--radius);padding:1rem;position:relative;overflow:hidden}
  .broker-form{display:grid;gap:0.85rem}
  .broker-form label{display:grid;gap:0.35rem;color:#94a3b8;font-size:0.86rem;font-weight:850}
  .broker-form input{min-height:52px;background:rgba(255,255,255,.04);border:1px solid rgba(0,240,255,.18);border-radius:16px;color:var(--text);padding:0 0.9rem}
  .broker-result{margin-top:0.85rem;padding:0.9rem;border-radius:16px;border:1px solid rgba(0,240,255,.18);background:rgba(0,0,0,.28);min-height:90px;font-size:0.9rem}
  .broker-actions{display:grid;gap:0.7rem;grid-template-columns:1fr 1fr}
  @media(max-width:560px){.broker-actions{grid-template-columns:1fr}}
  .broker-connected-card{display:grid;gap:1rem}
  .connected-status{display:grid;gap:0.55rem;padding:1rem;border-radius:16px;border:1px solid rgba(16,185,129,.28);background:rgba(16,185,129,.08)}
  .connected-status h3{margin:0;color:#ffffff;font-size:1.05rem}
  .connected-meta{display:grid;gap:0.35rem;color:#94a3b8;font-size:0.88rem}
  .connected-meta b{color:#ffffff}
  .button-danger{min-height:52px;border-radius:16px;border:1px solid rgba(255,77,77,.45);background:linear-gradient(180deg,rgba(255,77,77,.22),rgba(120,20,20,.35));color:#ffe8e8;font-weight:900;cursor:pointer}
  .button-danger:disabled{opacity:.55;cursor:not-allowed}
  #brokerLockOverlay{display:none}
  #brokerLockOverlay.is-visible{display:flex}
  #brokerConnectedCard{display:none}
  #brokerConnectedCard.is-visible{display:grid}
  .gated-blur.is-locked > .gated-content{filter:blur(7px);pointer-events:none;user-select:none}
  .gated-blur:not(.is-locked) > .gated-content{filter:none;pointer-events:auto;user-select:auto}
</style>

</head>

<div class="dashboard-shell">
  <header class="app-header">
    <a class="app-brand" href="./panel_dashboard.html"><span>N99 AI ORGANISM</span><strong>Broker Vault</strong></a>
    <span class="neon-pill" id="brokerTierPill">CHECKING</span>
  </header>

  <main class="broker-page-main">
    <section class="broker-form-card glass-panel gated-blur" id="brokerGateRoot">
      <div class="gated-content">
        <div class="card-topline" style="margin-bottom:1rem;">
          <div>
            <p class="section-label">MT5 Credential Gateway</p>
            <h2 style="margin:0;color:#ffffff;">Secure Broker Connection</h2>
          </div>
          <span class="neon-pill">AES-256 VAULT</span>
        </div>
        <section class="broker-connected-card" id="brokerConnectedCard" hidden aria-hidden="true">
          <div class="connected-status">
            <span class="neon-pill is-live">CONNECTED</span>
            <h3>Broker Active</h3>
            <div class="connected-meta" id="connectedBrokerDetails">
              <div><span>Server</span> <b id="connectedBrokerServer">-</b></div>
              <div><span>Login</span> <b id="connectedBrokerLogin">-</b></div>
              <div><span>Symbol</span> <b id="connectedBrokerSymbol">-</b></div>
            </div>
          </div>
          <button class="button-danger" type="button" id="brokerDisconnectBtn">Disconnect &amp; Reset Broker</button>
        </section>
        <form class="broker-form" id="userBrokerForm" autocomplete="off">
          <label>Broker Server<select id="userBrokerServer" style="width:100%"></select></label>
          <label>MT5 Login<input id="userBrokerLogin" placeholder="Account number"></label>
          <label>Password<input id="userBrokerPassword" type="password" placeholder="Encrypted to vault RAM"></label>
          <label>Symbol<input id="userBrokerSymbol" value="XAUUSD"></label>
          <div class="broker-actions">
            <button class="button-primary" type="button" id="userBrokerTestBtn">Test Connection</button>
            <button class="button-ghost" type="button" id="userBrokerSaveBtn">Save to Vault</button>
          </div>
        </form>
        <div class="broker-result" id="userBrokerResult">Menunggu permission check...</div>
      </div>
      <div class="lock-overlay" id="brokerLockOverlay" hidden aria-hidden="true">
        <div class="lock-badge" style="display:flex;align-items:center;gap:0.5rem;justify-content:center;">
          <svg aria-hidden="true" style="width:18px;height:18px;flex:0 0 auto;"><use href="./assets/icons/icons.svg#lock"></use></svg>
          Locked — Upgrade Tier to Connect Broker
        </div>
      </div>
    </section>
  </main>
